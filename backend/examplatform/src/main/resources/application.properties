spring.application.name=exam-platform
server.port=8080

spring.data.mongodb.uri=${MONGODB_URI:${MONGO_URI:}}

spring.jackson.default-property-inclusion=non_null

# ==========================
# EMAIL CONFIG (GMAIL SMTP)
# ==========================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${EMAIL_USER:${EMAIL_USERNAME:${SMTP_USERNAME:${MAIL_USERNAME:${MAIL_USER:}}}}}
spring.mail.password=${EMAIL_PASS:${EMAIL_PASSWORD:${SMTP_PASSWORD:${MAIL_PASSWORD:${MAIL_PASS:}}}}}

spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SSL_ENABLE:false}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:5000}
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SSL_TRUST:smtp.gmail.com}

# Optional fallback SMTP path (used by EmailService on primary send failure)
app.mail.smtp-fallback-enabled=${MAIL_SMTP_FALLBACK_ENABLED:true}
app.mail.smtp-fallback-port=${MAIL_SMTP_FALLBACK_PORT:465}

spring.mail.from=Exam Platform <${EMAIL_USER:${MAIL_USERNAME:${MAIL_USER:no-reply@example.com}}}>

# ==========================
# GOOGLE OAUTH2
# ==========================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Frontend base URL used after successful OAuth login.
app.oauth2.redirect-base-url=${APP_OAUTH2_REDIRECT_BASE_URL:http://localhost:5173}

# Security
APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,https://*.vercel.app}

